name: Laravel CI

on:
  push:
    branches:
      - master
      - staging
      - upgrade/tagging-2025
  pull_request:
    branches:
      - master
      - staging
      - upgrade/tagging-2025

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: olm_test
        ports: [3306:3306]
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -psecret"
          --health-interval=10s --health-timeout=5s --health-retries=3

      redis:
        image: redis:7
        ports: [6379:6379]

    env:
      APP_ENV: testing

      # database
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: olm_test
      DB_USERNAME: root
      DB_PASSWORD: secret

      # misc drivers
      BROADCAST_DRIVER: log
      CACHE_DRIVER: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array

      # fake S3/MinIO (used only by tests)
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
      AWS_EC2_METADATA_DISABLED: true
      AWS_BUCKET: olm-public
      AWS_ENDPOINT: http://127.0.0.1:9000
      x500_AWS_ACCESS_KEY_ID: minioadmin
      x500_AWS_SECRET_ACCESS_KEY: minioadmin
      x500_AWS_REGION: us-east-1
      x500_AWS_BUCKET: olm-public-bbox
      x500_AWS_ENDPOINT: http://127.0.0.1:9000

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, dom, fileinfo, mysql, pdo_mysql

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Prepare .env
        run: |
          cp .env.testing .env
          # now .env contains your local APP_KEY

      - name: Debug: List workspace & head of .env
        run: |
          echo "── Workspace ──"
          ls -1a
          echo; echo "── .env head ──"
          head -n 5 .env

      - name: Debug: Show APP_KEY line from .env
        run: |
          echo "APP_KEY in .env:"
          grep -E '^APP_KEY=' .env || echo "(!) no APP_KEY line found"

      - name: Debug: Base64‑decode length check
        run: |
          KEY=$(grep -E '^APP_KEY=' .env | cut -d= -f2-)
          echo "Raw value: $KEY"
          # strip the prefix and decode
          BYTES=$(echo "${KEY#base64:}" | base64 -d | wc -c)
          echo "Decoded length: $BYTES bytes (should be 32)"

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            nc -z 127.0.0.1 3306 && exit 0
            echo "Waiting for MySQL…"
            sleep 2
          done
          exit 1

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-scripts

      - name: Run migrations
        run: php artisan migrate --force --no-interaction -vvv

      - name: npm ci & build (optional)
        run: |
          npm ci --silent --force
          npm run build --if-present

      - name: PHPUnit
        run: vendor/bin/phpunit --colors=always
        env:
          REDIS_PORT: ${{ job.services.redis.ports[6379] }}
